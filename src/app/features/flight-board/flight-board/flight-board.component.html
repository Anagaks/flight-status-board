<div class="header">
  <h1>Flight Status Board</h1>
</div>

<div class="search-container">
  <mat-form-field appearance="outline">
    <mat-label>Search By Origin</mat-label>
    <input matInput (keyup)="onOriginSearch($event)" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Search By Destination</mat-label>
    <input matInput (keyup)="onDestinationSearch($event)" />
  </mat-form-field>
</div>

<div class="table-container mat-elevation-z8">
  <table mat-table [dataSource]="pagedFlights()" matSort (matSortChange)="announceSortChange($event)" class="mat-elevation-z8">

    <ng-container matColumnDef="origin">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Origin">Origin</th>
      <td mat-cell *matCellDef="let flight">
        {{ flight.origin }}
      </td>
    </ng-container>

    <ng-container matColumnDef="destination">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Destination">Destination</th>
      <td mat-cell *matCellDef="let flight">
        {{ flight.destination }}
      </td>
    </ng-container>
    
    <ng-container matColumnDef="arrivalTime">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by Arrival Time">
        Arrival Time (UTC)
      </th>
      <td mat-cell *matCellDef="let flight">
        {{ flight.arrivalTime }}
      </td>
    </ng-container>
        
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        Status
        <button mat-icon-button [matMenuTriggerFor]="statusMenu">
          <mat-icon>filter_list</mat-icon>
        </button>

        <mat-menu #statusMenu="matMenu">
          <button mat-menu-item (click)="onStatusChange('all')">All</button>
          <button mat-menu-item (click)="onStatusChange('On Time')">On Time</button>
          <button mat-menu-item (click)="onStatusChange('Delayed')">Delayed</button>
          <button mat-menu-item (click)="onStatusChange('Cancelled')">Cancelled</button>
        </mat-menu>
      </th>

      <td mat-cell *matCellDef="let flight">
        <span class="status-badge" [ngClass]="getStatusClass(flight.status)">
          {{ flight.status }}
        </span>
      </td>
    </ng-container>

    <tr mat-header-row class='' *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator 
    [length]="filteredFlights().length" 
    [pageSize]="pageSize()" 
    [pageSizeOptions]="[5, 10, 20]" 
    (page)="onPageChange($event)">
  </mat-paginator>
</div>
